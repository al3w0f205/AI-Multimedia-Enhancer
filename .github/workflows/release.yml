name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: AI-Multimedia-Enhancer-Installer.exe
            asset_path: installer_dist/AI-Multimedia-Enhancer-Installer.exe
          - os: macos-latest
            artifact_name: AI-Multimedia-Enhancer.dmg
            asset_path: dist/AI-Multimedia-Enhancer.dmg
          - os: ubuntu-latest
            artifact_name: AI-Multimedia-Enhancer-linux.tar.gz
            asset_path: dist/AI-Multimedia-Enhancer-linux.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python setup_dependencies.py
          pip install pyinstaller

      - name: Run build script
        run: python build.py

      # Empaquetado según sistema operativo
      - name: Packaging Windows Installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        run: |
          choco install innosetup
          iscc installer_setup.iss

      - name: Packaging macOS Disk Image (create-dmg)
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "AI Multimedia Enhancer" \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 380 120 \
            "dist/AI-Multimedia-Enhancer.dmg" \
            "dist/AI-Multimedia-Enhancer.app"

      - name: Packaging Linux Tarball
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf dist/AI-Multimedia-Enhancer-linux.tar.gz -C dist AI-Multimedia-Enhancer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_path }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/AI-Multimedia-Enhancer-Installer.exe/AI-Multimedia-Enhancer-Installer.exe
            artifacts/AI-Multimedia-Enhancer.dmg/AI-Multimedia-Enhancer.dmg
            artifacts/AI-Multimedia-Enhancer-linux.tar.gz/AI-Multimedia-Enhancer-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
